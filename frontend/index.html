<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quotation Manager</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">B2B - Quote Managment</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item" id="today_price_ars"></li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#"
                >Catalog</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="d-flex">
      <div class="col-2">
        <!--Search, Categories, Filters and statistics-->
        <aside class="d-flex flex-column m-3 gap-3">
          <!-- Serch section-->
          <section>
            <input
              class="form-control me-2"
              type="search"
              placeholder="Search by name"
              aria-label="Search"
              id="search-filter"
            />
          </section>
          <!-- Categories-->
          <section>
            <h4>Categories</h4>
            <ul class="list-group" id="categories-filter">
              <li data-category="all" class="list-group-item">All</li>
              <li data-category="server" class="list-group-item">Server</li>
              <li data-category="networking" class="list-group-item">
                Networking
              </li>
              <li data-category="storage" class="list-group-item">Storage</li>
              <li data-category="software" class="list-group-item">Software</li>
            </ul>
          </section>
          <!--Filters-->
          <section>
            <h4>Order by</h4>
            <ul class="list-group" id="orderby-filter">
              <li data-order="name" class="list-group-item">Name</li>
              <li data-order="asc" class="list-group-item">Price ↑ ASC</li>
              <li data-order="desc" class="list-group-item">Price ↓ DESC</li>
            </ul>
          </section>
          <!-- Statistics-->
        </aside>
      </div>

      <!--Products-->
      <div class="col-8 p-3">
        <div
          class="container d-flex flex-wrap gap-3 justify-content-around"
          id="products_container"
        ></div>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
